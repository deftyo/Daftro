name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: daftro
          POSTGRES_PASSWORD: daftro
          POSTGRES_DB: daftro
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://daftro:daftro@localhost:5432/daftro
      TASKLISTS_DIR: reports/example
      REPORTS_DIR: reports/example

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
        working-directory: server

      - run: npx prisma generate
        working-directory: server

      - run: node scripts/db-init.js
        working-directory: server

      - run: npm test
        working-directory: server
